<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Health & Wellness Personalized Exercise App</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h1>GoPal : Workout Buddy</h1>
    <p>Get a customized workout plan based on your goals, fitness level, and body type!</p>
  </header>

  <section id="form-section">
    <h2>Enter Your Information</h2>
    <form id="exerciseForm">
      <label for="age">Age:</label>
      <input type="number" id="age" name="age" required>

      <label for="weight">Weight (lbs):</label>
      <input type="number" id="weight" name="weight" required>

      <label for="height">Height (in):</label>
      <input type="number" id="height" name="height" required>

      <label for="fitnessLevel">Fitness Level:</label>
      <select id="fitnessLevel" name="fitnessLevel" required>
        <option value="beginner">Beginner</option>
        <option value="intermediate">Intermediate</option>
        <option value="advanced">Advanced</option>
      </select>

      <label for="goal">Fitness Goal:</label>
      <select id="goal" name="goal" required>
        <option value="weightLoss">Weight Loss</option>
        <option value="strength">Strength</option>
        <option value="cardio">Cardio</option>
      </select>

      <button type="submit">Get My Plan!</button>
    </form>
  </section>

  <section id="exercise-recommendations" style="display:none;">
    <h2>Your Personalized Exercise Plan</h2>
    <div id="exerciseList"></div>
    <div id="goalMessage"></div>
  </section>


  <script src="script.js"></script>

</body>
</html>
